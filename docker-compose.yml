version: '3.8'

services:
  # MySQL 8.0 - Base de datos
  mysql:
    image: mysql:8.0
    container_name: pos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_dev
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_pass
    ports:
      - "3306:3306"
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Angular Frontend
  pos-frontend:
    build:
      context: ./pos-frontend
      dockerfile: Dockerfile
    container_name: pos-frontend
    ports:
      - "4800:80"
    depends_on:
      - nginx

  # Backend Spring Boot (futuro)
  # pos-backend:
  #   build:
  #     context: ./pos-backend
  #   container_name: pos-backend
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pos_dev
  #     SPRING_DATASOURCE_USERNAME: pos_user
  #     SPRING_DATASOURCE_PASSWORD: pos_pass
  #   depends_on:
  #     mysql:
  #       condition: service_healthy

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pos-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - mysql
