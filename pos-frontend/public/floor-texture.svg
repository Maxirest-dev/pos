<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900">
  <defs>
    <filter id="wood" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.06" numOctaves="2" seed="15" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.04" intercept="0.58"/>
        <feFuncG type="linear" slope="0.035" intercept="0.46"/>
        <feFuncB type="linear" slope="0.02" intercept="0.34"/>
      </feComponentTransfer>
    </filter>
    <pattern id="planks" x="0" y="0" width="300" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="39" width="300" height="1" fill="rgba(0,0,0,0.05)"/>
      <rect x="149" y="0" width="1" height="40" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <pattern id="planks2" x="150" y="40" width="300" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="39" width="300" height="1" fill="rgba(0,0,0,0.05)"/>
      <rect x="149" y="0" width="1" height="40" fill="rgba(0,0,0,0.05)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#A08060"/>
  <rect width="100%" height="100%" filter="url(#wood)" opacity="0.5"/>
  <rect width="100%" height="100%" fill="url(#planks)"/>
  <rect width="100%" height="100%" fill="url(#planks2)"/>
</svg>
